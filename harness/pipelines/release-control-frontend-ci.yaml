pipeline:
  name: release-control-frontend-ci
  identifier: release_control_frontend_ci
  projectIdentifier: enterprise_delivery_platform
  orgIdentifier: default
  tags:
    service: release-control-frontend
    runtime: javascript
    capability: ci
  properties:
    ci:
      codebase:
        connectorRef: github
        repoName: release-control-frontend
        build:
          type: branch
          spec:
            branch: main
  stages:
    - stage:
        name: Source and Dependency Governance
        identifier: Source_and_Dependency_Governance
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: eks_dev_delegate
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          caching:
            enabled: true
          buildIntelligence:
            enabled: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Install locked dependencies
                  identifier: Install_locked_dependencies
                  spec:
                    connectorRef: dockerhub_public
                    image: node:22-alpine

                    shell: Sh
                    command: npm ci
              - step:
                  type: Run
                  name: Dependency audit
                  identifier: Dependency_audit
                  spec:
                    connectorRef: dockerhub_public
                    image: node:22-alpine

                    shell: Sh
                    command: npm audit --audit-level=high
              - step:
                  type: Run
                  name: Service metadata contract
                  identifier: Service_metadata_contract
                  spec:
                    connectorRef: dockerhub_public
                    image: node:22-alpine

                    shell: Sh
                    command: |
                      test -f package-lock.json
                      node -e "const pkg=require('./package.json'); if (pkg.name !== 'release-control-frontend') throw new Error('unexpected package name')"
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
    - stage:
        name: Test and Package
        identifier: Test_and_Package
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: eks_dev_delegate
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          caching:
            enabled: true
          buildIntelligence:
            enabled: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Install dependencies
                  identifier: Install_dependencies
                  spec:
                    connectorRef: dockerhub_public
                    image: node:22-alpine

                    shell: Sh
                    command: npm ci
              - step:
                  type: Run
                  name: Unit tests
                  identifier: Unit_tests
                  spec:
                    connectorRef: dockerhub_public
                    image: node:22-alpine

                    shell: Sh
                    command: npm test
              - step:
                  type: Run
                  name: Production build
                  identifier: Production_build
                  spec:
                    connectorRef: dockerhub_public
                    image: node:22-alpine

                    shell: Sh
                    command: npm run build
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
    - stage:
        name: Container Publish
        identifier: Container_Publish
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: eks_dev_delegate
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          caching:
            enabled: true
          execution:
            steps:
              - step:
                  type: BuildAndPushECR
                  name: Build and push ECR image
                  identifier: Build_and_push_ECR_image
                  spec:
                    connectorRef: aws
                    region: us-east-1
                    account: "808849570426"
                    imageName: release-control-frontend
                    tags:
                      - dev
                      - sha-<+codebase.commitSha>
                      - build-<+pipeline.sequenceId>
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
