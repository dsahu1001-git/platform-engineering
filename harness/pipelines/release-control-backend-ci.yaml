pipeline:
  name: release-control-backend-ci
  identifier: release_control_backend_ci
  projectIdentifier: enterprise_delivery_platform
  orgIdentifier: default
  tags:
    service: release-control-backend
    runtime: python
    capability: ci
  properties:
    ci:
      codebase:
        connectorRef: github
        repoName: release-control-backend
        build:
          type: branch
          spec:
            branch: main
  stages:
    - stage:
        name: Source and Dependency Governance
        identifier: Source_and_Dependency_Governance
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
          buildIntelligence:
            enabled: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Install locked dependencies
                  identifier: Install_locked_dependencies
                  spec:
                    shell: Sh
                    command: pip install -r requirements-dev.txt
              - step:
                  type: Run
                  name: Python syntax contract
                  identifier: Python_syntax_contract
                  spec:
                    shell: Sh
                    command: python -m compileall app
              - step:
                  type: Run
                  name: Runtime contract check
                  identifier: Runtime_contract_check
                  spec:
                    shell: Sh
                    command: |
                      python - <<'PY'
                      from app.config import settings
                      assert settings.app_name == "release-control-backend"
                      print("service contract ok")
                      PY
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
    - stage:
        name: Test and Package
        identifier: Test_and_Package
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
          buildIntelligence:
            enabled: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Install test dependencies
                  identifier: Install_test_dependencies
                  spec:
                    shell: Sh
                    command: pip install -r requirements-dev.txt
              - step:
                  type: Run
                  name: Unit and contract tests
                  identifier: Unit_and_contract_tests
                  spec:
                    shell: Sh
                    command: pytest tests
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
    - stage:
        name: Container Publish
        identifier: Container_Publish
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
          execution:
            steps:
              - step:
                  type: BuildAndPushECR
                  name: Build and push ECR image
                  identifier: Build_and_push_ECR_image
                  spec:
                    connectorRef: aws
                    region: us-east-1
                    account: "808849570426"
                    imageName: release-control-backend
                    tags:
                      - dev
                      - sha-<+codebase.commitSha>
                      - build-<+pipeline.sequenceId>
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
