apiVersion: v1
kind: ConfigMap
metadata:
  name: release-control-gateway
  namespace: release-control
data:
  default.conf: |
    server {
      listen 8080;

      location /api/ {
        proxy_pass http://release-control-backend.release-control.svc.cluster.local;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }

      location /metrics {
        proxy_pass http://release-control-backend.release-control.svc.cluster.local/metrics;
      }

      location / {
        proxy_pass http://release-control-frontend.release-control.svc.cluster.local:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-control-backend
  namespace: release-control
  labels:
    app.kubernetes.io/name: release-control-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: release-control-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: release-control-backend
    spec:
      containers:
        - name: backend
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              apt-get update &&
              apt-get install -y --no-install-recommends git &&
              rm -rf /var/lib/apt/lists/* &&
              git clone --depth 1 https://github.com/dsahu1001-git/release-control-backend.git /app &&
              cd /app &&
              pip install --no-cache-dir -r requirements.txt &&
              uvicorn app.main:app --host 0.0.0.0 --port 8000
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: dev
            - name: APP_VERSION
              value: "0.1.0"
            - name: COMMIT_SHA
              value: "8a57626"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: release-control-backend-db
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: release-control-backend
  namespace: release-control
spec:
  selector:
    app.kubernetes.io/name: release-control-backend
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-control-frontend
  namespace: release-control
  labels:
    app.kubernetes.io/name: release-control-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: release-control-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: release-control-frontend
    spec:
      containers:
        - name: frontend
          image: node:22-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache git &&
              git clone --depth 1 https://github.com/dsahu1001-git/release-control-frontend.git /app &&
              cd /app &&
              npm ci &&
              npm run build &&
              npm install -g serve &&
              serve -s dist -l 8080
          ports:
            - containerPort: 8080
          env:
            - name: VITE_API_BASE_URL
              value: /api
            - name: VITE_ENVIRONMENT
              value: dev
            - name: VITE_APP_VERSION
              value: "0.1.0"
            - name: VITE_COMMIT_SHA
              value: "a497ccb"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: release-control-frontend
  namespace: release-control
spec:
  selector:
    app.kubernetes.io/name: release-control-frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-control-gateway
  namespace: release-control
  labels:
    app.kubernetes.io/name: release-control-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: release-control-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: release-control-gateway
    spec:
      containers:
        - name: gateway
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: release-control-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: release-control-gateway
  namespace: release-control
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: release-control-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
