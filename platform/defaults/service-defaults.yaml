apiVersion: platform.example.com/v1
kind: ServiceDefaults
metadata:
  name: standard
spec:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  rollout:
    strategy: rolling
  observability:
    logs: true
    metrics: true
    traces: false
